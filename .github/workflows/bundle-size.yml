name: Bundle Size

on:
  pull_request:
    branches:
      - stage
      - main
    paths:
      - "packages/server/src/**"
      - "packages/core/src/**"
      - "packages/shared/src/**"

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Report bundle size
        uses: actions/github-script@v9
        with:
          script: |
            const { execSync } = require('child_process')

            const run = (cmd) => execSync(cmd, { encoding: 'utf8' }).trim()

            const totalSize = run('du -sh packages/server/dist | cut -f1')
            const fileLines = run(
              'find packages/server/dist -type f | sort | xargs du -sh 2>/dev/null'
            )

            const body = [
              '## Bundle Size',
              '',
              `**\`packages/server/dist\`** — \`${totalSize}\``,
              '',
              '<details><summary>File breakdown</summary>',
              '',
              '```',
              fileLines,
              '```',
              '',
              '</details>',
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c => c.body.startsWith('## Bundle Size'))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
